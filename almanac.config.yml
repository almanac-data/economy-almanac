# Almanac vertical identity. The schema, scripts, and CI all read from here.
name: "Economy Almanac"
slug: "economy-almanac"
description: "An open, versioned index of public economic data."
homepage: "https://github.com/almanac-data/economy-almanac"
domain: "economics"

# ---------------------------------------------------------------------------
# Reachability monitoring (added by headless-fallback propagation).
# ---------------------------------------------------------------------------
reachability:
  # Verify CDN-bot-blocked federal sources (Census, Congress.gov, GAO, ...) with
  # a real headless Chromium. Requires Playwright (requirements-headless.txt); CI
  # installs the browser only when this is true.
  headless: true
